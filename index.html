<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知識庫 AI Chatbot | RAG Personal Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --accent3: #6af7c2;
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --text-faint: #44445a;
    --user-bubble: #1e1a3a;
    --bot-bubble: #121a1e;
    --glow: rgba(124, 106, 247, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
    position: relative;
    overflow: hidden;
  }
  .sidebar::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo {
    padding: 0 24px 24px;
    border-bottom: 1px solid var(--border);
  }
  .logo-tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .logo-title {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
  }
  .logo-title span { color: var(--accent); }

  .kb-section {
    padding: 20px 24px;
    flex: 1;
    overflow-y: auto;
  }
  .kb-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .kb-entry {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .kb-entry::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.2s;
  }
  .kb-entry:hover::before { transform: scaleY(1); }
  .kb-entry:hover { border-color: var(--accent); background: rgba(124,106,247,0.07); }
  .kb-entry-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }
  .kb-entry-preview {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-footer {
    padding: 16px 24px 0;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .rag-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(106, 247, 194, 0.08);
    border: 1px solid rgba(106, 247, 194, 0.2);
    border-radius: 6px;
    padding: 8px 12px;
  }
  .rag-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .rag-text {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent3);
    letter-spacing: 1px;
  }
  
  /* 變更金鑰按鈕 */
  .change-key-btn {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-size: 11px;
    padding: 6px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .change-key-btn:hover {
    border-color: var(--accent2);
    color: var(--text);
  }

  /* ── Main Chat ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }
  .chat-header-left { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .chat-name { font-weight: 500; font-size: 15px; }
  .chat-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }
  .context-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
  }
  .ctx-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent3);
  }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; gap: 12px; animation: msgIn 0.3s ease; max-width: 85%; }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .msg.bot .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }
  .msg.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .msg-body { display: flex; flex-direction: column; gap: 4px; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.65;
  }
  .msg.bot .msg-bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }
  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    resize: none;
    min-height: 22px;
    max-height: 120px;
    line-height: 1.6;
  }
  textarea::placeholder { color: var(--text-faint); }
  .send-btn {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: #fff;
  }
  .send-btn:hover { background: #9080ff; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .input-hint {
    font-size: 10px;
    color: var(--text-faint);
    font-family: 'Space Mono', monospace;
    margin-top: 8px;
    text-align: center;
  }

  .ctx-panel {
    background: rgba(106,247,194,0.04);
    border: 1px solid rgba(106,247,194,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    margin-top: 8px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--accent3);
    opacity: 0.8;
  }
  .ctx-panel-label { font-weight: 700; margin-bottom: 4px; letter-spacing: 1px; }
  .ctx-panel-text { color: var(--text-dim); font-family: 'Noto Sans TC', sans-serif; font-size: 11px; }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .messages { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-tag">RAG System</div>
    <div class="logo-title">知識庫<br><span>AI Chatbot</span></div>
  </div>

  <div class="kb-section">
    <div class="kb-label">📚 Knowledge Base</div>
    <div id="kb-list">
      </div>
  </div>

  <div class="sidebar-footer">
    <button class="change-key-btn" onclick="promptApiKey()">⚙️ 設定/修改 Gemini API Key</button>
    <div class="rag-badge">
      <div class="rag-dot"></div>
      <span class="rag-text">RAG Active</span>
    </div>
  </div>
</aside>

<div class="main">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="avatar">🤖</div>
      <div>
        <div class="chat-name">Knowledge Assistant</div>
        <div class="chat-sub">Powered by RAG + Gemini</div>
      </div>
    </div>
    <div class="context-indicator">
      <div class="ctx-dot"></div>
      <span id="ctx-count">0 chunks indexed</span>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🧠</div>
      <h2>RAG 知識庫助理</h2>
      <p>我只根據以下知識庫的內容來回答。每個回答都會標示所使用的知識來源。</p>
      <div class="suggestion-grid" id="suggestions"></div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="根據知識庫問我任何問題…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter 送出 · Shift+Enter 換行 · 回答僅基於知識庫內容</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// 📚 KNOWLEDGE BASE
// ═══════════════════════════════════════════════
const KNOWLEDGE_BASE = [
  {
    id: "kb-001",
    title: "台灣交通概覽",
    content: `台灣擁有完善的大眾交通系統。台灣高鐵（HSR）連接台北至高雄，全程僅需約90分鐘，最高時速可達300公里。台灣鐵路管理局（TRA）提供較慢但覆蓋更廣的火車服務，是前往花蓮、台東等東部城市的主要交通方式。台北捷運（MRT）有6條主線，每天服務超過200萬乘客，24小時皆有班次。台灣的機車文化非常盛行，全台登記機車超過1400萬輛。台北市內計程車起跳為70元新台幣。`
  },
  {
    id: "kb-002",
    title: "台灣美食文化",
    content: `台灣的夜市文化馳名國際。士林夜市是台北最大的夜市，每晚吸引超過十萬名遊客。必嚐美食包括：臭豆腐（雖然氣味強烈，但口感酥脆）、珍珠奶茶（台灣原創發明，1980年代起源於台南）、小籠包（知名品牌鼎泰豐源自台灣）、滷肉飯（碢肉淋飯，是台灣的國民料理）。台灣牛肉麵節每年11月在台北舉行，是全球規模最大的牛肉麵比賽。`
  },
  {
    id: "kb-003",
    title: "台灣著名景點",
    content: `台灣必遊景點包括：九份老街，以金礦開採歷史聞名，被認為是宮崎駿電影《神隱少女》的靈感來源之一。日月潭位於南投縣，是台灣最大的天然湖泊，面積約7.93平方公里，海拔748公尺。阿里山以日出雲海與神木群聞名，阿里山森林鐵路為世界僅存的高山鐵路之一。太魯閣國家公園擁有壯觀的大理石峽谷，是台灣最受歡迎的健行目的地。台北101曾是世界最高建築（2004–2010年），高度為508公尺，擁有世界最大的風阻尼器。`
  },
  {
    id: "kb-004",
    title: "台灣氣候與最佳旅遊時間",
    content: `台灣屬於亞熱帶氣候，四季如下：春季（3–5月）溫暖多雨，氣溫約18–25°C；夏季（6–8月）炎熱潮濕，氣溫30–35°C，颱風季節在7–9月；秋季（9–11月）為最佳旅遊季節，天氣宜人、颱風減少；冬季（12–2月）北部偏冷多雨（約10–15°C），南部仍晴朗溫暖（約20°C）。東北季風影響台灣北部，因此台北冬季降雨較多。年均降雨量：台北約2500mm、台南約1700mm。`
  },
  {
    id: "kb-005",
    title: "台灣科技與經濟",
    content: `台灣是全球半導體產業的重鎮。台積電（TSMC）成立於1987年，目前生產全球超過90%的最先進晶片（7奈米以下），市值超過5000億美元。台灣GDP（2023年）約7900億美元，人均GDP約3.3萬美元。新竹科學工業園區被譽為「台灣矽谷」，設有超過550家科技公司。台灣在PCT國際專利申請量中排名全球第5。台灣的外匯存底高達5600億美元，為全球前五大。`
  },
  {
    id: "kb-006",
    title: "台灣語言與文化",
    content: `台灣的官方語言為繁體中文（普通話）。台語（閩南語）為台灣本土最主要的語言，約有70%的人口會說。客家語由約15%的人口使用。台灣原住民族共有16個官方認定族群，各有其語言與文化。英語在台北等大城市的觀光區相當普及，許多人可以用英語溝通。台灣文化融合了中華、日本、荷蘭及南島原住民的影響，尤其在飲食、建築與節慶方面最為明顯。`
  }
];

const SUGGESTIONS = [
  { title: "交通", text: "台灣高鐵有多快？要多少時間從台北到高雄？" },
  { title: "美食", text: "台灣有哪些必吃的夜市食物？" },
  { title: "景點", text: "九份和日月潭各有什麼特色？" },
  { title: "科技", text: "台積電在全球半導體市場的地位如何？" },
];

function retrieveChunks(query, topK = 3) {
  const q = query.toLowerCase().replace(/[？?，,。！!\s]/g, '');
  const grams = [];
  for (let i = 0; i < q.length - 1; i++) grams.push(q.substring(i, i + 2));
  if (q.length === 1) grams.push(q);

  const scored = KNOWLEDGE_BASE.map(chunk => {
    const text = (chunk.title + chunk.content).toLowerCase();
    let score = 0;
    grams.forEach(g => {
      if (text.includes(g)) score++;
      if (chunk.title.toLowerCase().includes(g)) score += 2;
    });
    return { ...chunk, score };
  });
  return scored.sort((a, b) => b.score - a.score).slice(0, topK).filter(c => c.score > 0);
}

// ═══════════════════════════════════════════════
// 🔒 安全金鑰彈窗管理機制
// ═══════════════════════════════════════════════
function checkAndPromptKey() {
  const savedKey = localStorage.getItem('MY_CHAT_GEMINI_KEY');
  if (!savedKey) {
    promptApiKey();
  }
}

function promptApiKey() {
  const oldKey = localStorage.getItem('MY_CHAT_GEMINI_KEY') || '';
  const userKey = prompt("🔑 請輸入您的 Gemini API Key：\n(此 Key 將安全地儲存在您本機瀏覽器中，不會外流)", oldKey);
  
  if (userKey !== null) {
    const trimmed = userKey.trim();
    if (trimmed) {
      localStorage.setItem('MY_CHAT_GEMINI_KEY', trimmed);
      alert("金鑰儲存成功！網頁已就緒。");
    } else {
      localStorage.removeItem('MY_CHAT_GEMINI_KEY');
      alert("已清除金鑰。在輸入有效的金鑰前，助理將無法回應。");
    }
  }
}

function initUI() {
  // 初始化檢查是否已有金鑰
  setTimeout(checkAndPromptKey, 500);

  const list = document.getElementById('kb-list');
  KNOWLEDGE_BASE.forEach(chunk => {
    const div = document.createElement('div');
    div.className = 'kb-entry';
    div.innerHTML = `<div class="kb-entry-title">${chunk.title}</div><div class="kb-entry-preview">${chunk.content.slice(0,50)}…</div>`;
    div.onclick = () => {
      document.getElementById('input').value = `請介紹「${chunk.title}」的相關內容`;
      document.getElementById('input').focus();
    };
    list.appendChild(div);
  });

  document.getElementById('ctx-count').textContent = `${KNOWLEDGE_BASE.length} chunks indexed`;

  const grid = document.getElementById('suggestions');
  SUGGESTIONS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'suggestion';
    div.innerHTML = `<strong>${s.title}</strong>${s.text}`;
    div.onclick = () => {
      document.getElementById('input').value = s.text;
      sendMessage();
    };
    grid.appendChild(div);
  });
}

let isLoading = false;

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendMsg(role, content, sources = [], retrievedText = '') {
  hideWelcome();
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.textContent = role === 'bot' ? '🤖' : '👤';

  const body = document.createElement('div');
  body.className = 'msg-body';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = content;

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });

  body.appendChild(bubble);

  if (retrievedText && role === 'bot') {
    const ctx = document.createElement('div');
    ctx.className = 'ctx-panel';
    ctx.innerHTML = `<div class="ctx-panel-label">📎 RETRIEVED CONTEXT</div><div class="ctx-panel-text">${retrievedText}</div>`;
    body.appendChild(ctx);
  }

  if (sources.length > 0 && role === 'bot') {
    const srcs = document.createElement('div');
    srcs.className = 'sources';
    sources.forEach(s => {
      const chip = document.createElement('span');
      chip.className = 'source-chip';
      chip.textContent = `📖 ${s}`;
      srcs.appendChild(chip);
    });
    body.appendChild(srcs);
  }

  body.appendChild(meta);
  div.appendChild(avatarEl);
  div.appendChild(body);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function showTyping() {
  hideWelcome();
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.textContent = '🤖';

  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'typing-dot';
    ind.appendChild(d);
  }
  div.appendChild(avatarEl);
  div.appendChild(ind);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;

  const currentKey = localStorage.getItem('MY_CHAT_GEMINI_KEY');
  if (!currentKey) {
    alert('偵測不到 API Key！請點擊左下角「設定/修改 Gemini API Key」進行設定。');
    promptApiKey();
    return;
  }

  const input = document.getElementById('input');
  const query = input.value.trim();
  if (!query) return;

  isLoading = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendMsg('user', query);
  showTyping();

  const chunks = retrieveChunks(query);
  const contextText = chunks.length > 0
    ? chunks.map(c => `[${c.title}]\n${c.content}`).join('\n\n')
    : '（未找到相關知識庫內容）';

  const sourceNames = chunks.map(c => c.title);
  const retrievedSnippet = chunks.length > 0
    ? chunks.map(c => `[${c.title}] ${c.content.slice(0, 60)}…`).join(' | ')
    : '無匹配內容';

  const systemPrompt = `你是一個 RAG 知識庫助理。你只能根據以下提供的知識庫內容來回答問題。如果問題超出知識庫範圍，請明確告知用戶「這個問題不在我的知識庫範圍內」，不可自行補充額外資訊。請用繁體中文回答，語氣友善、清晰。

=== 知識庫內容 ===
${contextText}
=== 知識庫結束 ===

重要規則：
1. 只根據上方知識庫內容回答
2. 如果答案不在知識庫中，誠實說明
3. 回答時可以引用知識標題作為來源
4. 保持回答簡潔有用`;

  try {
 const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash-latest:generateContent?key=${currentKey}`, {
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [
          { 
            role: "user", 
            parts: [{ text: `${systemPrompt}\n\n[用戶提問]\n${query}` }] 
          }
        ]
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.candidates && data.candidates[0]) {
      const answer = data.candidates[0].content.parts[0].text;
      appendMsg('bot', answer, sourceNames, retrievedSnippet);
    } else {
      appendMsg('bot', '抱歉，連線失敗。請確認輸入的 API Key 是否有效。錯誤訊息：' + (data.error ? data.error.message : 'Unknown Error'), [], '');
    }
  } catch (err) {
    removeTyping();
    appendMsg('bot', `網路連線錯誤：${err.message}`, [], '');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

initUI();
</script>
</body>
</html>
