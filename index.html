<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知識庫 AI Chatbot | RAG Personal Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --accent3: #6af7c2;
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --text-faint: #44445a;
    --user-bubble: #1e1a3a;
    --bot-bubble: #121a1e;
    --glow: rgba(124, 106, 247, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
    position: relative;
    overflow: hidden;
  }
  .sidebar::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo {
    padding: 0 24px 24px;
    border-bottom: 1px solid var(--border);
  }
  .logo-tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .logo-title {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
  }
  .logo-title span { color: var(--accent); }

  .kb-section {
    padding: 20px 24px;
    flex: 1;
    overflow-y: auto;
  }
  .kb-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .kb-entry {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .kb-entry::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.2s;
  }
  .kb-entry:hover::before { transform: scaleY(1); }
  .kb-entry:hover { border-color: var(--accent); background: rgba(124,106,247,0.07); }
  .kb-entry-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }
  .kb-entry-preview {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-footer {
    padding: 16px 24px 0;
    border-top: 1px solid var(--border);
  }
  .rag-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(106, 247, 194, 0.08);
    border: 1px solid rgba(106, 247, 194, 0.2);
    border-radius: 6px;
    padding: 8px 12px;
  }
  .rag-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .rag-text {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent3);
    letter-spacing: 1px;
  }

  /* ── Main Chat ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }
  .chat-header-left { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .chat-name { font-weight: 500; font-size: 15px; }
  .chat-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }
  .context-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
  }
  .ctx-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent3);
  }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; gap: 12px; animation: msgIn 0.3s ease; max-width: 85%; }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .msg.bot .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }
  .msg.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .msg-body { display: flex; flex-direction: column; gap: 4px; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.65;
  }
  .msg.bot .msg-bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .msg.user .msg-bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(124,106,247,0.3);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .msg-meta {
    font-size: 10px;
    color: var(--text-faint);
    font-family: 'Space Mono', monospace;
    padding: 0 4px;
  }
  .msg.user .msg-meta { text-align: right; }

  /* Source citation chips */
  .sources {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .source-chip {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    background: rgba(124,106,247,0.1);
    border: 1px solid rgba(124,106,247,0.3);
    border-radius: 4px;
    padding: 2px 8px;
    color: var(--accent);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 16px;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-top-left-radius: 4px;
    width: fit-content;
  }
  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Welcome screen */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
    gap: 20px;
  }
  .welcome-icon {
    width: 64px; height: 64px;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin-bottom: 8px;
    box-shadow: 0 0 40px var(--glow);
  }
  .welcome h2 { font-size: 22px; font-weight: 700; }
  .welcome p { font-size: 14px; color: var(--text-dim); max-width: 420px; line-height: 1.7; }
  .suggestion-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 480px;
    margin-top: 8px;
  }
  .suggestion {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .suggestion:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(124,106,247,0.08);
    transform: translateY(-2px);
  }
  .suggestion strong {
    display: block;
    color: var(--text);
    font-size: 13px;
    margin-bottom: 4px;
  }

  /* ── Input ── */
  .input-area {
    padding: 16px 28px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }
  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    resize: none;
    min-height: 22px;
    max-height: 120px;
    line-height: 1.6;
  }
  textarea::placeholder { color: var(--text-faint); }
  .send-btn {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: #fff;
  }
  .send-btn:hover { background: #9080ff; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .input-hint {
    font-size: 10px;
    color: var(--text-faint);
    font-family: 'Space Mono', monospace;
    margin-top: 8px;
    text-align: center;
  }

  /* Retrieved context panel */
  .ctx-panel {
    background: rgba(106,247,194,0.04);
    border: 1px solid rgba(106,247,194,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    margin-top: 8px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--accent3);
    opacity: 0.8;
  }
  .ctx-panel-label { font-weight: 700; margin-bottom: 4px; letter-spacing: 1px; }
  .ctx-panel-text { color: var(--text-dim); font-family: 'Noto Sans TC', sans-serif; font-size: 11px; }

  /* Mobile */
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .messages { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-tag">RAG System</div>
    <div class="logo-title">知識庫<br><span>AI Chatbot</span></div>
  </div>

  <div class="kb-section">
    <div class="kb-label">📚 Knowledge Base</div>
    <div id="kb-list">
      <!-- populated by JS -->
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="rag-badge">
      <div class="rag-dot"></div>
      <span class="rag-text">RAG Active</span>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="avatar">🤖</div>
      <div>
        <div class="chat-name">Knowledge Assistant</div>
        <div class="chat-sub">Powered by RAG + Claude</div>
      </div>
    </div>
    <div class="context-indicator">
      <div class="ctx-dot"></div>
      <span id="ctx-count">0 chunks indexed</span>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🧠</div>
      <h2>RAG 知識庫助理</h2>
      <p>我只根據以下知識庫的內容來回答。每個回答都會標示所使用的知識來源。</p>
      <div class="suggestion-grid" id="suggestions"></div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="根據知識庫問我任何問題…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter 送出 · Shift+Enter 換行 · 回答僅基於知識庫內容</div>
  </div>
</div>

<script>
// UI init - sidebar knowledge list
const KB_TITLES = ["台灣交通概覽","台灣美食文化","台灣著名景點","台灣氣候與最佳旅遊時間","台灣科技與經濟","台灣語言與文化"];
const SUGGESTIONS = [
  { title: "交通", text: "台灣高鐵有多快？要多少時間從台北到高雄？" },
  { title: "美食", text: "台灣有哪些必吃的夜市食物？" },
  { title: "景點", text: "九份和日月潭各有什麼特色？" },
  { title: "科技", text: "台積電在全球半導體市場的地位如何？" },
];
function initUI() {
  const list = document.getElementById('kb-list');
  KB_TITLES.forEach(title => {
    const div = document.createElement('div');
    div.className = 'kb-entry';
    div.innerHTML = `<div class="kb-entry-title">${title}</div><div class="kb-entry-preview">點擊查看相關內容</div>`;
    list.appendChild(div);
  });
  document.getElementById('ctx-count').textContent = `${KB_TITLES.length} chunks indexed`;
  const grid = document.getElementById('suggestions');
  SUGGESTIONS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'suggestion';
    div.innerHTML = `<strong>${s.title}</strong>${s.text}`;
    grid.appendChild(div);
  });
}
initUI();
</script>
<link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
<script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
<df-messenger
  project-id="rag-chatbot-8008c"
  agent-id="ac1e4b8f-edf7-43a0-b856-7cfa8f019857"
  language-code="zh-tw"
  max-query-length="-1">
  <df-messenger-chat-bubble
    chat-title="台灣旅遊知識庫助理">
  </df-messenger-chat-bubble>
</df-messenger>
<style>
  df-messenger {
    z-index: 999;
    position: fixed;
    --df-messenger-font-color: #000;
    --df-messenger-font-family: Google Sans;
    --df-messenger-chat-background: #f3f6fc;
    --df-messenger-message-user-background: #d3e3fd;
    --df-messenger-message-bot-background: #fff;
    bottom: 16px;
    right: 16px;
  }
</style>
</body>
</html>
